<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Komos — Your Night, Your Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #120E2E;
    --dark: #1A1245;
    --card: #231960;
    --border: #3D3284;
    --orange: #FF5500;
    --orange-light: #FF7733;
    --white: #FFFFFF;
    --muted: #9B93CC;
    --green: #1db954;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  .header { position: sticky; top: 0; z-index: 100; background: var(--dark); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 4px; color: var(--orange); line-height: 1; }
  .logo span { color: var(--muted); font-size: 10px; display: block; letter-spacing: 3px; font-family: 'DM Sans', sans-serif; font-weight: 300; margin-top: -2px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .queue-pill { background: var(--orange); color: var(--white); font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: 20px; cursor: pointer; letter-spacing: 0.5px; border: none; }
  .credits-badge { background: rgba(255,85,0,0.2); border: 1px solid rgba(255,85,0,0.4); color: var(--orange-light); font-size: 11px; font-weight: 500; padding: 6px 12px; border-radius: 20px; display: none; cursor: pointer; }
  .queue-count-badge { background: white; color: var(--orange); border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; margin-left: 4px; font-weight: 700; }

  /* ── HERO ── */
  .hero { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); background: linear-gradient(160deg, #2D2264 0%, #120E2E 100%); }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 14vw, 72px); line-height: 0.9; letter-spacing: 2px; color: var(--white); margin-bottom: 10px; }
  .hero h1 em { font-style: normal; color: var(--orange); display: block; }
  .hero p { font-size: 13px; color: var(--muted); font-weight: 300; letter-spacing: 0.5px; }
  .price-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .price-tag { background: rgba(255,85,0,0.15); border: 1px solid rgba(255,85,0,0.4); border-radius: 6px; padding: 7px 14px; font-size: 12px; color: var(--orange-light); letter-spacing: 0.5px; }
  .price-tag strong { font-size: 18px; font-weight: 500; }
  .bundle-pill { background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; font-size: 12px; color: var(--muted); cursor: pointer; letter-spacing: 0.5px; transition: border-color 0.15s, color 0.15s; }
  .bundle-pill:hover { border-color: var(--orange); color: var(--orange-light); }

  /* ── BUNDLE SCREEN ── */
  .bundle-screen { position: fixed; inset: 0; background: var(--black); z-index: 400; display: none; flex-direction: column; padding: 24px; overflow-y: auto; }
  .bundle-screen.show { display: flex; }
  .bundle-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .back-btn { background: transparent; border: none; color: var(--muted); font-size: 24px; cursor: pointer; padding: 4px; line-height: 1; }
  .bundle-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--white); }
  .bundle-subtitle { font-size: 13px; color: var(--muted); font-weight: 300; margin-bottom: 28px; padding-left: 40px; }
  .bundle-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; position: relative; overflow: hidden; }
  .bundle-card:hover { border-color: var(--orange); }
  .bundle-card:active { transform: scale(0.98); }
  .bundle-card.featured { border-color: var(--orange); }
  .featured-badge { position: absolute; top: 14px; right: 14px; background: var(--orange); color: white; font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px; }
  .bundle-songs { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--white); letter-spacing: 1px; }
  .bundle-desc { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 300; }
  .bundle-price { font-size: 24px; font-weight: 500; color: var(--orange); margin-top: 10px; }
  .bundle-saving { font-size: 11px; color: #1db954; margin-top: 2px; font-weight: 300; }
  .bundle-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 20px; font-weight: 300; line-height: 1.6; }
  .login-prompt { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
  .login-prompt p { font-size: 13px; color: var(--muted); margin-bottom: 14px; font-weight: 300; line-height: 1.6; }
  .btn-login { background: var(--orange); color: white; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; padding: 14px 32px; cursor: pointer; width: 100%; margin-bottom: 8px; }
  .btn-guest-link { background: transparent; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: underline; }

  /* ── SEARCH ── */
  .search-section { padding: 18px 20px; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 16px; }
  input[type="text"] { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 14px 14px 14px 42px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--orange); }
  input[type="text"]::placeholder { color: var(--muted); font-weight: 300; }

  /* ── RESULTS ── */
  .results { padding: 0 20px 100px; }
  .section-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; margin-top: 4px; }
  .track-card { display: flex; align-items: center; gap: 14px; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .track-card:active { transform: scale(0.98); }
  .track-card:hover { border-color: var(--orange); }
