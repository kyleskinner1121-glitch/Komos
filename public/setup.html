<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komos — Venue Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --black: #120E2E; --dark: #1A1245; --card: #231960; --border: #3D3284; --orange: #FF5500; --orange-light: #FF7733; --white: #FFFFFF; --muted: #9B93CC; --green: #27ae60; --red: #e74c3c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 5px; color: var(--orange); margin-bottom: 4px; text-align: center; }
  .subtitle { font-size: 11px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 40px; text-align: center; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--white); margin-bottom: 6px; }
  .card-desc { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.6; margin-bottom: 24px; }
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
  input[type="text"] { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 8px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--orange); }
  input[type="text"]::placeholder { color: var(--muted); }
  .input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 300; }
  .btn-spotify { width: 100%; background: #1db954; color: white; border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; padding: 16px; cursor: pointer; transition: opacity 0.15s; margin-top: 8px; }
  .btn-spotify:hover { opacity: 0.9; }
  .btn-spotify:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-box { border-radius: 10px; padding: 16px; margin-top: 24px; display: none; }
  .status-box.success { background: rgba(39,174,96,0.1); border: 1px solid rgba(39,174,96,0.3); }
  .status-box.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); }
  .status-box.show { display: block; }
  .status-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .status-desc { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.5; }
  .success .status-title { color: var(--green); }
  .error .status-title { color: var(--red); }
  .venue-info { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); display: none; }
  .venue-info.show { display: block; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); font-weight: 300; flex-shrink: 0; }
  .info-value { color: var(--white); font-weight: 500; font-family: monospace; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { background: var(--border); border: none; color: var(--muted); padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; transition: color 0.15s; }
  .copy-btn:hover { color: var(--white); }
  .device-status { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 14px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .dot.grey { background: var(--muted); }
  .divider { height: 1px; background: var(--border); margin: 24px 0; }
</style>
</head>
<body>

<div class="logo">Komos</div>
<div class="subtitle">Venue Setup</div>

<div class="card">
  <div class="card-title">Connect Your Venue</div>
  <div class="card-desc">Enter a unique ID for your venue then connect your Spotify Premium account. Patrons will be able to queue songs directly to your speakers.</div>

  <div class="input-group">
    <label class="input-label">Venue ID</label>
    <input type="text" id="venueId" placeholder="e.g. stuttgart-bar-one">
    <div class="input-hint">Lowercase letters, numbers and hyphens only.</div>
  </div>

  <button class="btn-spotify" id="connectBtn" onclick="connectSpotify()">
    ♫ Connect Spotify Account
  </button>

  <div class="status-box" id="statusBox">
    <div class="status-title" id="statusTitle"></div>
    <div class="status-desc" id="statusDesc"></div>
  </div>

  <div class="venue-info" id="venueInfo">
    <div class="info-row">
      <span class="info-label">Venue ID</span>
      <span class="info-value" id="infoVenueId"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Patron URL</span>
      <span class="info-value" id="infoPatronUrl"></span>
      <button class="copy-btn" onclick="copyUrl('patron')">Copy</button>
    </div>
    <div class="info-row">
      <span class="info-label">Bar Dashboard</span>
      <span class="info-value" id="infoBarUrl"></span>
      <button class="copy-btn" onclick="copyUrl('bar')">Copy</button>
    </div>
    <div class="device-status" id="deviceStatus">
      <div class="dot grey" id="deviceDot"></div>
      <span id="deviceText">Checking Spotify device...</span>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const success = params.get('success');
  const error = params.get('error');
  const venueId = params.get('venueId');

  if (success && venueId) {
    document.getElementById('venueId').value = venueId;
    showSuccess(venueId);
    checkDevice(venueId);
  } else if (error) {
    showError(error);
  }

  // Pre-fill venue ID from URL if provided
  const prefilledVenue = params.get('venue');
  if (prefilledVenue) {
    const input = document.getElementById('venueId');
    input.value = prefilledVenue;
    input.readOnly = true;
    input.style.opacity = '0.7';
  }
});

function connectSpotify() {
  const venueId = document.getElementById('venueId').value.trim();
  if (!venueId) { alert('Please enter a venue ID first'); return; }
  if (!/^[a-z0-9-]+$/.test(venueId)) { alert('Venue ID can only contain lowercase letters, numbers and hyphens'); return; }
  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';
  window.location.href = `/auth/spotify?venueId=${venueId}`;
}

function showSuccess(venueId) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box success show';
  document.getElementById('statusTitle').textContent = '✓ Spotify Connected Successfully';
  document.getElementById('statusDesc').textContent = 'Your Spotify account is now connected. Songs requested by patrons will automatically play through your speakers.';

  const patronUrl = `${BASE}?venue=${venueId}`;
  const barUrl = `${BASE}/bar?venue=${venueId}`;

  document.getElementById('infoVenueId').textContent = venueId;
  document.getElementById('infoPatronUrl').textContent = patronUrl;
  document.getElementById('infoBarUrl').textContent = barUrl;
  document.getElementById('venueInfo').classList.add('show');
}

function showError(error) {
  const box = document.getElementById('statusBox');
  box.className = 'status-box error show';
  document.getElementById('statusTitle').textContent = '✗ Connection Failed';
  document.getElementById('statusDesc').textContent = `Error: ${error}. Please try again.`;
}

async function checkDevice(venueId) {
  try {
    const r = await fetch(`/api/venue/status?venueId=${venueId}`);
    const data = await r.json();
    const dot = document.getElementById('deviceDot');
    const text = document.getElementById('deviceText');
    if (data.connected && data.device) {
      dot.className = 'dot green';
      text.textContent = `Spotify active on: ${data.device}`;
    } else if (data.connected) {
      dot.className = 'dot grey';
      text.textContent = 'Connected — open Spotify on your device and play something to activate';
    } else {
      dot.className = 'dot red';
      text.textContent = 'No Spotify device found — make sure Spotify is open and playing';
    }
  } catch(e) {}
}

function copyUrl(type) {
  const venueId = document.getElementById('venueId').value.trim();
  const url = type === 'patron' ? `${BASE}?venue=${venueId}` : `${BASE}/bar?venue=${venueId}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
</script>
</body>
</html>
