<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komos — Bar Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --black: #0a0a0a; --dark: #111; --card: #1a1a1a; --border: #2a2a2a; --gold: #c9a84c; --gold-light: #e8c97a; --white: #f0ece4; --muted: #666; --green: #27ae60; --red: #e74c3c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .header { background: var(--dark); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; }
  .main { display: grid; grid-template-columns: 1fr 320px; gap: 0; min-height: calc(100vh - 61px); }
  .queue-main { padding: 24px; border-right: 1px solid var(--border); }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
  .now-playing { background: linear-gradient(135deg, rgba(29,185,84,0.15), rgba(29,185,84,0.05)); border: 1px solid rgba(29,185,84,0.4); border-radius: 12px; padding: 20px; margin-bottom: 24px; display: none; }
  .now-playing.show { display: block; }
  .now-playing .label { font-size: 10px; letter-spacing: 3px; color: #1db954; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .now-playing .song { display: flex; align-items: center; gap: 14px; }
  .now-playing img { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; }
  .now-playing .name { font-size: 18px; font-weight: 500; }
  .now-playing .artist { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 12px; }
  .progress-fill { height: 3px; background: #1db954; border-radius: 2px; transition: width 1s linear; }
  .queue-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; transition: opacity 0.3s; }
  .q-num { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--muted); width: 28px; text-align: center; flex-shrink: 0; }
  .q-img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .q-info { flex: 1; min-width: 0; }
  .q-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .q-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-played { background: var(--green); color: white; border: none; border-radius: 6px; padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
  .btn-skip { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; }
  .btn-skip:hover { color: var(--red); border-color: var(--red); }
  .empty-queue { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-queue .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
  .empty-queue p { font-size: 13px; font-weight: 300; }
  .sidebar { padding: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .stat-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); letter-spacing: 1px; }
  .stat-sub { font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 2px; }
  .played-list { margin-top: 24px; }
  .played-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); opacity: 0.5; }
  .played-item img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; }
  .played-item .name { font-size: 12px; }
  .played-item .artist { font-size: 11px; color: var(--muted); }
  .auto-badge { background: rgba(29,185,84,0.15); border: 1px solid rgba(29,185,84,0.3); color: #1db954; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
  @media (max-width: 768px) { .main { grid-template-columns: 1fr; } .sidebar { border-top: 1px solid var(--border); } }
</style>
</head>
<body>
<div class="header">
  <div>
    <span class="logo">Komos</span>
    <span style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);margin-left:8px;letter-spacing:1px">Bar Dashboard</span>
    <span class="auto-badge">Auto-sync on</span>
  </div>
  <div class="status"><span class="live-dot"></span> Live</div>
</div>
<div class="main">
  <div class="queue-main">
    <p class="section-title">Now Playing & Queue</p>
    <div class="now-playing" id="nowPlaying">
      <div class="label"><span class="live-dot"></span> Now playing on Spotify</div>
      <div class="song">
        <img id="npImg" src="" alt="">
        <div style="flex:1">
          <div class="name" id="npName"></div>
          <div class="artist" id="npArtist"></div>
          <div class="progress-bar" style="margin-top:8px">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="queueList">
      <div class="empty-queue">
        <div class="icon">🎵</div>
        <p>No songs in queue yet.<br>Share the QR code with patrons.</p>
      </div>
    </div>
  </div>
  <div class="sidebar">
    <p class="section-title">Tonight</p>
    <div class="stat-card">
      <div class="stat-label">Songs played</div>
      <div class="stat-value" id="statPlayed">0</div>
      <div class="stat-sub">this session</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Revenue generated</div>
      <div class="stat-value" id="statRevenue">€0</div>
      <div class="stat-sub">at €1.00 per song</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In queue now</div>
      <div class="stat-value" id="statQueue">0</div>
      <div class="stat-sub">songs pending</div>
    </div>
    <div class="played-list" id="playedList"></div>
  </div>
</div>
<script>
const VENUE_ID = new URLSearchParams(window.location.search).get('venue') || 'default';
let lastNowPlayingUri = null;

async function loadQueue() {
  try {
    const r = await fetch(`/api/queue?venueId=${VENUE_ID}`);
    const data = await r.json();
    renderQueue(data.queue || []);
    renderStats(data.queue || [], data.played || []);
    renderPlayed(data.played || []);
  } catch(e) {}
}

async function checkNowPlaying() {
  try {
    const r = await fetch(`/api/now-playing?venueId=${VENUE_ID}`);
    const data = await r.json();
    if (data.playing) {
      document.getElementById('npImg').src = data.image || '';
      document.getElementById('npName').textContent = data.name;
      document.getElementById('npArtist').textContent = data.artist;
      document.getElementById('nowPlaying').classList.add('show');
      const progress = (data.progress_ms / data.duration_ms) * 100;
      document.getElementById('progressFill').style.width = `${progress}%`;
      // Auto-clear if this song is in our queue
      if (data.uri && data.uri !== lastNowPlayingUri) {
        lastNowPlayingUri = data.uri;
        await fetch('/api/queue/auto-clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ venueId: VENUE_ID, uri: data.uri })
        });
        await loadQueue();
      }
    } else {
      document.getElementById('nowPlaying').classList.remove('show');
    }
  } catch(e) {}
}

function renderQueue(queue) {
  const el = document.getElementById('queueList');
  if (!queue.length) {
    el.innerHTML = `<div class="empty-queue"><div class="icon">🎵</div><p>No songs in queue yet.<br>Share the QR code with patrons.</p></div>`;
    return;
  }
  el.innerHTML = queue.map((s, i) => `
    <div class="queue-item" id="item-${s.id}">
      <div class="q-num">${i + 1}</div>
      <img class="q-img" src="${s.image || ''}" onerror="this.style.background='#2a2a2a'" alt="">
      <div class="q-info">
        <div class="q-name">${s.name}</div>
        <div class="q-artist">${s.artist}</div>
      </div>
      <div class="q-actions">
        <button class="btn-played" onclick="markPlayed(${s.id})">✓ Played</button>
        <button class="btn-skip" onclick="skipSong(${s.id})">Skip</button>
      </div>
    </div>
  `).join('');
}

function renderStats(queue, played) {
  document.getElementById('statPlayed').textContent = played.length;
  document.getElementById('statRevenue').textContent = `€${played.length}`;
  document.getElementById('statQueue').textContent = queue.length;
}

function renderPlayed(played) {
  if (!played.length) return;
  document.getElementById('playedList').innerHTML =
    `<p style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">Recently played</p>` +
    [...played].reverse().map(s => `
      <div class="played-item">
        <img src="${s.image || ''}" onerror="this.style.background='#2a2a2a'" alt="">
        <div>
          <div class="name">${s.name}</div>
          <div class="artist">${s.artist}</div>
        </div>
      </div>
    `).join('');
}

async function markPlayed(id) {
  const el = document.getElementById(`item-${id}`);
  if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }
  await fetch(`/api/queue/played/${id}`, { method: 'POST' });
  loadQueue();
}

async function skipSong(id) {
  const el = document.getElementById(`item-${id}`);
  if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }
  await fetch(`/api/queue/skip/${id}`, { method: 'POST' });
  loadQueue();
}

// Poll queue every 5 seconds
// Poll now playing every 3 seconds for smooth auto-clear
loadQueue();
checkNowPlaying();
setInterval(loadQueue, 5000);
setInterval(checkNowPlaying, 3000);
</script>
</body>
</html>
